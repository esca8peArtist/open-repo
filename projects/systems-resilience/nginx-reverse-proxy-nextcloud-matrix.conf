# nginx Configuration: Reverse Proxy for Nextcloud + Matrix Stack
#
# This file terminates TLS for all three domains and proxies requests
# to the appropriate backend services running in Docker containers.
#
# Copy to: /etc/nginx/conf.d/nextcloud-matrix.conf (on host or in nginx container)
# Or: /opt/nextcloud-matrix/nginx-reverse-proxy-nextcloud-matrix.conf (with docker volume mount)
#
# Key features:
# - TLS 1.2+ only (no SSLv3)
# - Modern cipher suites (no weak algorithms)
# - Automatic redirect HTTP → HTTPS
# - Proper headers for Nextcloud (X-Real-IP, X-Forwarded-*)
# - Matrix federation support
# - Compression (gzip) for static content
# - Rate limiting on Matrix APIs
# - Caching headers for static assets

# Redirect all HTTP traffic to HTTPS
# This runs on port 80 and redirects to 443
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    server_tokens off;

    # Allow ACME challenges for certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================================
# NEXTCLOUD CONFIGURATION
# ============================================================================
#
# Proxies to Nextcloud FPM container on 172.20.0.5:9000
# Serves PHP files and static assets

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name nextcloud.example.com;
    server_tokens off;

    # SSL/TLS Configuration
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # TLS versions: 1.2 and 1.3 only (no older protocols)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Modern cipher suites (from Mozilla recommendations)
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS: Force HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/nextcloud_access.log combined;
    error_log /var/log/nginx/nextcloud_error.log warn;

    client_max_body_size 512M;

    # Root location
    root /var/www/html;

    # Nextcloud-specific: Disable direct PHP execution (except index.php)
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        if (!-f $document_root$fastcgi_script_name) {
            return 404;
        }

        # Connect to Nextcloud FPM container
        fastcgi_pass nextcloud:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Pass through important headers for reverse proxy
        fastcgi_param HTTP_PROXY "";
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param REMOTE_PORT $remote_port;
        fastcgi_param SERVER_ADDR $server_addr;
        fastcgi_param SERVER_PORT $server_port;

        # Nextcloud-specific headers for proper protocol/domain detection
        fastcgi_param X-Real-IP $remote_addr;
        fastcgi_param X-Forwarded-For $proxy_add_x_forwarded_for;
        fastcgi_param X-Forwarded-Proto $scheme;
        fastcgi_param X-Forwarded-Host $server_name;

        fastcgi_intercept_errors on;
        fastcgi_request_buffering off;
        fastcgi_connect_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
    }

    # Deny access to sensitive files
    location ~ /\.ht {
        deny all;
    }

    location ~ /\. {
        deny all;
    }

    # Cache static assets (CSS, JS, images)
    location ~* \.(gif|ico|jpg|jpeg|png|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Nextcloud well-known URLs
    location /.well-known/carddav {
        return 301 $scheme://$host/remote.php/dav;
    }

    location /.well-known/caldav {
        return 301 $scheme://$host/remote.php/dav;
    }

    location /.well-known/webfinger {
        return 301 $scheme://$host/index.php/.well-known/webfinger;
    }

    location /.well-known/nodeinfo {
        return 301 $scheme://$host/index.php/.well-known/nodeinfo;
    }

    # Catch-all: pass to Nextcloud
    location / {
        try_files $uri $uri/ /index.php$request_uri;
    }
}

# ============================================================================
# MATRIX CONFIGURATION
# ============================================================================
#
# Proxies to Matrix Synapse container on 172.20.0.4:8008
# Handles all Matrix client and federation APIs

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name matrix.example.com;
    server_tokens off;

    # SSL/TLS Configuration (same as Nextcloud)
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/matrix_access.log combined;
    error_log /var/log/nginx/matrix_error.log warn;

    client_max_body_size 100M;

    # Rate limiting on registration and login endpoints (prevent abuse)
    limit_req_zone $binary_remote_addr zone=register:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

    location /_matrix/client/r0/register {
        limit_req zone=register burst=10 nodelay;
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /_matrix/client/r0/login {
        limit_req zone=login burst=20 nodelay;
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # All other Matrix APIs (no rate limiting, but with connection limits)
    location /_matrix {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for real-time sync
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;

        # Timeouts for long-polling
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }

    # Synapse admin API (optional, restrict if exposed)
    location /_synapse/admin {
        # Only allow from specific IPs (optional security layer)
        # allow 127.0.0.1;
        # deny all;

        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Cache static JSON responses
    location ~ \.json$ {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Catch-all
    location / {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }
}

# ============================================================================
# ELEMENT WEB (CHAT CLIENT) CONFIGURATION
# ============================================================================
#
# Serves Element Web (Matrix client UI) from 172.20.0.6
# This is a static React application with embedded config

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name chat.example.com;
    server_tokens off;

    # SSL/TLS Configuration
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers (stricter for web app)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self';" always;

    # Logging
    access_log /var/log/nginx/element_access.log combined;
    error_log /var/log/nginx/element_error.log warn;

    root /app;

    # Single Page Application routing: Send all 404s to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Config file (served as static, not cached)
    location = /config.json {
        add_header Cache-Control "no-cache, must-revalidate";
        proxy_pass http://element:80/config.json;
    }

    # Static assets with long cache (versioned)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html: no cache (always fetch latest)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ============================================================================
# WELL-KNOWN ENDPOINTS FOR MATRIX FEDERATION & DISCOVERY
# ============================================================================
#
# These endpoints allow other Matrix servers to discover and reach your instance
# Required for federation to work properly

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # Serve from example.com (the MATRIX_SERVER_NAME in docker-compose)
    server_name example.com;
    server_tokens off;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/wellknown_access.log combined;
    error_log /var/log/nginx/wellknown_error.log warn;

    # Matrix server discovery (RFC 7033 / .well-known/matrix/server)
    location /.well-known/matrix/server {
        add_header Content-Type "application/json" always;
        add_header Cache-Control "public, max-age=86400" always;
        return 200 '{"m.server": "matrix.example.com:443"}';
    }

    # Matrix client discovery
    location /.well-known/matrix/client {
        add_header Content-Type "application/json" always;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Access-Control-Allow-Origin "*" always;
        return 200 '{
            "m.homeserver": {
                "base_url": "https://matrix.example.com"
            },
            "m.identity_server": {
                "base_url": "https://vector.im"
            }
        }';
    }

    # Redirect other requests to Nextcloud
    location / {
        return 301 https://nextcloud.example.com$request_uri;
    }
}

# ============================================================================
# GZIP COMPRESSION (Global)
# ============================================================================
#
# Compress text-based responses for faster transfer

gzip on;
gzip_vary on;
gzip_min_length 1000;
gzip_types text/plain text/css text/xml text/javascript
           application/x-javascript application/xml+rss
           application/json application/javascript
           image/svg+xml;
gzip_disable "msie6";

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
#
# Define log formats for better debugging

log_format combined_extended '$remote_addr - $remote_user [$time_local] '
                             '"$request" $status $body_bytes_sent '
                             '"$http_referer" "$http_user_agent" '
                             '$request_time $upstream_response_time';

# ============================================================================
# NOTE: CERTIFICATE PATHS
# ============================================================================
#
# Update these paths after obtaining certificates:
#   - Let's Encrypt: /etc/letsencrypt/live/DOMAIN_NAME/
#   - Self-signed: /etc/ssl/certs/self-signed/
#
# Example (Let's Encrypt):
#   ssl_certificate /etc/letsencrypt/live/nextcloud.example.com/fullchain.pem;
#   ssl_certificate_key /etc/letsencrypt/live/nextcloud.example.com/privkey.pem;
#
# Example (Self-signed):
#   ssl_certificate /etc/ssl/certs/self-signed/certificate.crt;
#   ssl_certificate_key /etc/ssl/certs/self-signed/private.key;
