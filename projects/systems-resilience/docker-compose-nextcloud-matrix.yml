version: '3.8'

# Nextcloud + Matrix Deployment Stack
# Production-grade docker-compose configuration
#
# Usage:
#   1. Copy to /opt/nextcloud-matrix/docker-compose.yml
#   2. Update .env file with your domain and passwords
#   3. Configure TLS certificates (see NEXTCLOUD_MATRIX_DEPLOYMENT_PLAYBOOK.md Part 3)
#   4. Run: docker-compose up -d
#
# Networking: All services on internal 172.20.0.0/16 network
# Only nginx exposed to host (127.0.0.1:80, 127.0.0.1:443)
# All other services are container-only accessible

services:
  # PostgreSQL 15 - Shared database for Nextcloud and Matrix
  postgres:
    image: postgres:15-alpine
    container_name: nc-matrix-postgres
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Memory tuning for production
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    volumes:
      # Named volume for persistent database storage
      - postgres_data:/var/lib/postgresql/data
    networks:
      backend:
        ipv4_address: 172.20.0.2
    # Resource limits (adjust for your hardware)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis 7 - Session cache and job queue (shared by Nextcloud and Matrix)
  redis:
    image: redis:7-alpine
    container_name: nc-matrix-redis
    restart: always
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      backend:
        ipv4_address: 172.20.0.3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nextcloud (FPM variant) - No built-in web server, requires nginx
  nextcloud:
    image: nextcloud:33-fpm-alpine
    container_name: nc-matrix-nextcloud
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      # Database configuration
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres

      # Nextcloud admin account (set on first run only)
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_ADMIN_EMAIL: ${NEXTCLOUD_ADMIN_EMAIL}

      # Nextcloud domain and protocol
      NEXTCLOUD_TRUSTED_DOMAINS: ${DOMAIN_NEXTCLOUD}
      OVERWRITEHOST: ${DOMAIN_NEXTCLOUD}
      OVERWRITEPROTOCOL: https
      OVERWRITEWEBROOT: /

      # Mail configuration for notifications
      MAIL_FROM_ADDRESS: ${SMTP_FROM}
      MAIL_DOMAIN: ${DOMAIN_NAME}
      MAIL_SMTPHOST: ${SMTP_HOST}
      MAIL_SMTPPORT: ${SMTP_PORT}
      MAIL_SMTPAUTH: 1
      MAIL_SMTPNAME: ${SMTP_USER}
      MAIL_SMTPPASSWORD: ${SMTP_PASSWORD}

      # Redis cache configuration
      REDIS_HOST: redis
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD}

      # PHP performance settings
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 512M

    volumes:
      # Nextcloud root (includes config, data, apps)
      - nextcloud_data:/var/www/html
      # Additional data directory for better scaling (optional)
      - nextcloud_storage:/data
    networks:
      backend:
        ipv4_address: 172.20.0.5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Matrix Synapse - Homeserver
  synapse:
    image: matrixdotorg/synapse:v1.124
    container_name: nc-matrix-synapse
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8008/_matrix/client/versions || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      # Server configuration
      SYNAPSE_SERVER_NAME: ${MATRIX_SERVER_NAME}
      SYNAPSE_REPORT_STATS: "no"

      # Database configuration
      SYNAPSE_DB_ENGINE: psycopg2
      SYNAPSE_DB_HOST: postgres
      SYNAPSE_DB_NAME: synapse
      SYNAPSE_DB_USER: synapse
      SYNAPSE_DB_PASSWORD: ${POSTGRES_PASSWORD}

      # Redis configuration for caching
      SYNAPSE_REDIS_HOST: redis
      SYNAPSE_REDIS_PORT: 6379
      SYNAPSE_REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Registration and security
      SYNAPSE_REGISTRATION_SHARED_SECRET: ${MATRIX_SHARED_SECRET}
      SYNAPSE_LOG_LEVEL: ${MATRIX_LOG_LEVEL:-INFO}

      # Performance tuning
      SYNAPSE_WORKER_REPLICATION_ENABLED: "no"

      # Email configuration
      SYNAPSE_NOTIF_FROM: "noreply <${SMTP_FROM}>"
      SYNAPSE_EMAIL_SMTP_HOST: ${SMTP_HOST}
      SYNAPSE_EMAIL_SMTP_PORT: ${SMTP_PORT}
      SYNAPSE_EMAIL_SMTP_USER: ${SMTP_USER}
      SYNAPSE_EMAIL_SMTP_PASSWORD: ${SMTP_PASSWORD}
      SYNAPSE_EMAIL_SMTP_TLS: "true"
    volumes:
      # Matrix data (config, database, signing keys)
      - synapse_data:/data
    networks:
      backend:
        ipv4_address: 172.20.0.4
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Element Web - Matrix client (web UI)
  element:
    image: vectorim/element-web:latest
    container_name: nc-matrix-element
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Element Web configuration via environment variables
    # Configuration is passed via volume-mounted config.json (see nginx section)
    volumes:
      # Element Web config - maps to /app/config.json inside container
      - ./element-config.json:/app/config.json:ro
    networks:
      backend:
        ipv4_address: 172.20.0.6
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # nginx - Reverse proxy, TLS termination
  # This service handles HTTPS for all three domains
  nginx:
    image: nginx:alpine
    container_name: nc-matrix-nginx
    restart: always
    depends_on:
      - nextcloud
      - synapse
      - element
    ports:
      # HTTP (port 80) - Required for ACME/Let's Encrypt challenges
      # Bound to 127.0.0.1 to prevent external access without TLS
      - "127.0.0.1:80:80"
      # HTTPS (port 443) - Main ingress point
      - "127.0.0.1:443:443"
    volumes:
      # nginx configuration
      - ./nginx-reverse-proxy-nextcloud-matrix.conf:/etc/nginx/conf.d/default.conf:ro

      # TLS certificates (mounted read-only)
      # Let's Encrypt certs: /etc/letsencrypt/live/nextcloud.example.com/
      # Update paths below to match your certificate location
      - /etc/letsencrypt/live/${DOMAIN_NEXTCLOUD}/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/${DOMAIN_NEXTCLOUD}/privkey.pem:/etc/nginx/certs/privkey.pem:ro

      # nginx cache for static assets
      - nginx_cache:/var/cache/nginx

      # nginx logs
      - ./logs/nginx:/var/log/nginx
    networks:
      backend:
        ipv4_address: 172.20.0.7
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Optional: Prometheus for metrics collection
  # Uncomment to enable monitoring (requires prometheus-community/prometheus image)
  #
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: nc-matrix-prometheus
  #   restart: always
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus_data:/prometheus
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'
  #   networks:
  #     - backend
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '1'
  #         memory: 512M

  # Optional: Grafana for visualization dashboard
  # Uncomment to enable monitoring dashboards
  #
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: nc-matrix-grafana
  #   restart: always
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
  #   volumes:
  #     - grafana_data:/var/lib/grafana
  #   networks:
  #     - backend
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '1'
  #         memory: 512M

# Named volumes for persistent storage
# These survive container restarts and are backed up
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nextcloud_data:
    driver: local
  nextcloud_storage:
    driver: local
  synapse_data:
    driver: local
  nginx_cache:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# Networks
networks:
  # Backend network for service-to-service communication
  # Services on this network can reach each other by service name
  # External access only via nginx on 127.0.0.1
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

# Metadata and documentation
x-metadata:
  description: |
    Nextcloud + Matrix deployment stack for systems-resilience Phase 5/6.
    This is a production-grade configuration suitable for 200-500 concurrent users.

    Architecture:
    - PostgreSQL 15: Shared database backend (4 GB volumes recommended)
    - Redis 7: Session and cache layer (512 MB max memory)
    - Nextcloud 33 (FPM): Document collaboration and file storage
    - Matrix Synapse: Encrypted messaging and federation
    - Element Web: Web-based Matrix client
    - nginx: Reverse proxy with TLS termination

    All services except nginx are internal-only. nginx handles all external HTTPS traffic.

    Total resource requirements (production):
    - CPU: 4-8 cores (2 per service, headroom for I/O)
    - RAM: 8 GB (2 GB per major service)
    - Storage: 100 GB+ (grows with Nextcloud usage)
    - Network: 100 Mbps+ for good performance

    See NEXTCLOUD_MATRIX_DEPLOYMENT_PLAYBOOK.md for deployment instructions.
  version: "1.0"
  updated: "2026-06-04"
