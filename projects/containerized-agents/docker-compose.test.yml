# docker-compose.test.yml — minimal service stack for integration tests
# Spin up with:  docker compose -f docker-compose.test.yml up -d
# Tear down with: docker compose -f docker-compose.test.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "test"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 2s
      timeout: 5s
      retries: 10

  ollama-stub:
    build:
      context: tests/integration/stubs
      dockerfile: Dockerfile.ollama-stub
    ports:
      - "11434:11434"
