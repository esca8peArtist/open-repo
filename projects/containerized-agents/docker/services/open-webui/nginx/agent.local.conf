# agent.local.conf — nginx reverse proxy for the AgentCore stack
# Containerized AI Agents — v1.0
#
# Serves http://agent.local (mDNS hostname resolved by Avahi/Bonjour on the LAN).
# Proxies:
#   /          -> open-webui:3000  (chat UI)
#   /api/      -> agentcore:8080   (orchestration API)
#
# Mount via docker-compose.yml:
#   volumes:
#     - ./docker/services/open-webui/nginx/:/etc/nginx/conf.d/:ro

# ---------------------------------------------------------------------------
# Upstream definitions
# ---------------------------------------------------------------------------
upstream open_webui {
    server open-webui:3000;
    keepalive 32;
}

upstream agentcore {
    server agentcore:8080;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# Gzip compression
# ---------------------------------------------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

# ---------------------------------------------------------------------------
# Main server block — port 80 / agent.local
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name agent.local;

    # -----------------------------------------------------------------------
    # Security headers
    # -----------------------------------------------------------------------
    # Prevent clickjacking: Open WebUI must not be embedded in an iframe.
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Content Security Policy: restrict sources to self + local network.
    # Adjust if additional external resources are needed.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' ws: wss:; font-src 'self' data:;"
        always;

    # HSTS: enforce HTTPS if/when TLS is added in future.
    # Commented out for initial HTTP-only local deployment.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -----------------------------------------------------------------------
    # Static asset caching (Open WebUI build artefacts)
    # -----------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        proxy_pass http://open_webui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets for 7 days at the browser.
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # -----------------------------------------------------------------------
    # AgentCore API proxy — /api/
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass http://agentcore/;
        proxy_http_version 1.1;

        # WebSocket upgrade support (streaming responses, event bus)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Generous timeouts for long-running tool calls and LLM streaming.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        # Disable buffering so streaming responses reach the client immediately.
        proxy_buffering off;
    }

    # -----------------------------------------------------------------------
    # Open WebUI — everything else (including WebSocket at /ws)
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://open_webui;
        proxy_http_version 1.1;

        # WebSocket upgrade support (Open WebUI uses WebSockets for live updates)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Generous timeouts: Ollama inference can take 30–120 seconds.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        # Disable buffering for streaming token output.
        proxy_buffering off;

        # Allow large uploads (document ingestion, voice audio files).
        client_max_body_size 100M;
    }
}
