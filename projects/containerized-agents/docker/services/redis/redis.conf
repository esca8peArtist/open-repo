# redis.conf — Redis configuration for the AgentCore message queue and cache
# Containerized AI Agents — v1.0
#
# Role: Task queue (high/normal/low priority), inter-agent Pub/Sub bus,
#       RAG and LLM response cache, session store, and rate-limit counters.
#       Required for Tier 3+ profiles with concurrent multi-agent operation.
#
# Mount via docker-compose.yml:
#   volumes:
#     - ./docker/services/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
#   command: redis-server /usr/local/etc/redis/redis.conf

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
# Bind to all interfaces inside the container.
# The port is NOT exposed to the host network (docker-compose maps only to
# 127.0.0.1 on the host), so container-internal access only.
bind 0.0.0.0

port 6379

# Keep idle connections alive to avoid TCP RST surprises with long-lived clients.
tcp-keepalive 300

# Client connection timeout: 0 = never timeout (agent workers hold persistent
# connections). Adjust to 300 if connection leaks are observed.
timeout 0

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
# Password is injected from the .env file via the compose `command` override
# or environment substitution. The placeholder below is illustrative — the
# actual requirepass directive is set on the Redis command line in docker-compose
# so that the secret is not stored in a checked-in file.
#
# If this file is used directly (without compose command override), set the
# REDIS_PASSWORD value in a secrets manager and uncomment:
# requirepass <REDIS_PASSWORD>

# ---------------------------------------------------------------------------
# Memory Management
# ---------------------------------------------------------------------------
# 512 MB default; override via --maxmemory on the redis-server command line
# in docker-compose.yml (REDIS_MAXMEMORY env var).
maxmemory 512mb

# Eviction policy: when memory is full, evict the least-recently-used key
# across all key-spaces. Appropriate for a mixed cache + queue workload.
# Queue items (Lists) are processed and deleted quickly; cache keys are the
# primary eviction target.
maxmemory-policy allkeys-lru

# ---------------------------------------------------------------------------
# Persistence — AOF (Append-Only File)
# ---------------------------------------------------------------------------
# Enable AOF so queue items survive an unplanned Redis restart.
# RDB snapshots are disabled (no save directives) to reduce I/O spikes
# during heavy inference workloads.
appendonly yes

# fsync policy: flush AOF to disk once per second.
# Trade-off: up to 1 second of data loss on crash vs. full durability on
# every write (appendfsync always), which would hurt throughput.
appendfsync everysec

# Rewrite the AOF file when it grows by 100% (doubles in size) AND is at
# least 64 MB, to keep the file compact.
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Do not hold fsync during AOF rewrite (prevents latency spikes on Tier 1
# hardware with slower NVMe).
no-appendfsync-on-rewrite yes

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
loglevel notice

# Log to stdout so Docker captures it via json-file driver.
logfile ""

# ---------------------------------------------------------------------------
# Disabled Dangerous Commands
# ---------------------------------------------------------------------------
# Rename destructive or privileged commands to empty string to disable them.
# This prevents accidental or malicious data loss in production.
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command CONFIG   ""
rename-command DEBUG    ""

# ---------------------------------------------------------------------------
# Slow Log
# ---------------------------------------------------------------------------
# Log commands that take longer than 10ms.
slowlog-log-slower-than 10000
slowlog-max-len 128

# ---------------------------------------------------------------------------
# Miscellaneous
# ---------------------------------------------------------------------------
# Disable protected-mode: container networking already restricts external access.
protected-mode no

# Disable crash log to avoid writing large dump files on edge hardware.
crash-log-enabled no
crash-memlog-enabled no
