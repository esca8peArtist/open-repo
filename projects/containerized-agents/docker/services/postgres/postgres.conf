# postgres.conf — PostgreSQL tuning for Containerized AI Agents
# Containerized AI Agents — v1.0
#
# Target: single-box embedded deployment (Tier 1–4 hardware).
# Tuned for moderate concurrency, conversational workloads, and reliability.
# These values override the defaults in the official postgres Docker image.
#
# Mount this file into the container:
#   volumes:
#     - ./docker/services/postgres/postgres.conf:/etc/postgresql/postgresql.conf
# And instruct postgres to use it:
#   command: postgres -c config_file=/etc/postgresql/postgresql.conf

# ---------------------------------------------------------------------------
# Connection Settings
# ---------------------------------------------------------------------------
# Single-box deployment: keep connections modest.
# Open WebUI + AgentCore + pgAdmin + health checks = ~20–40 connections typical.
max_connections = 100

# Reserve connections for superuser maintenance even when pool is exhausted.
superuser_reserved_connections = 3

# ---------------------------------------------------------------------------
# Memory
# ---------------------------------------------------------------------------
# shared_buffers: ~25% of available RAM, capped at 256 MB for Tier 1 safety.
# Override via POSTGRES_SHARED_BUFFERS env var if running on Tier 3/4.
shared_buffers = 256MB

# Per-query work buffer; higher values speed up sorts/joins but multiply by
# max_connections in worst case. 16 MB is conservative and safe.
work_mem = 16MB

# For VACUUM, CREATE INDEX, etc. — single-operation, so can be larger.
maintenance_work_mem = 64MB

# OS page cache benefit hint. Set to ~50-75% of total RAM on dedicated server;
# 1 GB is a safe default that fits Tier 1 (16 GB) through Tier 4.
effective_cache_size = 1GB

# ---------------------------------------------------------------------------
# Write-Ahead Log (WAL) — Reliability
# ---------------------------------------------------------------------------
# fsync guarantees data reaches disk on commit; never disable on production.
fsync = on

# synchronous_commit: 'on' = fully durable per commit.
# Trade-off: slight latency increase vs. data safety. Keep 'on' for audit_log.
synchronous_commit = on

# WAL level: 'replica' enables streaming replication if needed in future.
wal_level = replica

# WAL compression reduces I/O on slower NVMe/eMMC storage (Tier 1 hardware).
wal_compression = on

# Checkpoint tuning: spread I/O to avoid checkpoint spikes.
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min
max_wal_size = 1GB
min_wal_size = 80MB

# ---------------------------------------------------------------------------
# Query Planner
# ---------------------------------------------------------------------------
# Assume SSD/NVMe storage (random I/O is cheap).
random_page_cost = 1.1
effective_io_concurrency = 200

# Parallel workers for large queries (keep low on Tier 1 to avoid contention
# with Ollama inference threads).
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_worker_processes = 8

# ---------------------------------------------------------------------------
# Autovacuum
# ---------------------------------------------------------------------------
# Keep autovacuum enabled; conversational workloads create steady row churn.
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min

# Trigger vacuum sooner on small tables (audit_log grows quickly).
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off   # Docker captures stderr directly; no collector needed

# Log slow queries for performance analysis.
log_min_duration_statement = 500    # ms; queries slower than this are logged

# Log connection events (useful for debugging pool exhaustion).
log_connections = off
log_disconnections = off

# Timestamp format compatible with structured log parsers.
log_timezone = 'UTC'
log_line_prefix = '%t [%p] %u@%d '

# ---------------------------------------------------------------------------
# Performance Monitoring — pg_stat_statements
# ---------------------------------------------------------------------------
# Must also be in shared_preload_libraries (set below).
pg_stat_statements.max = 1000
pg_stat_statements.track = all
pg_stat_statements.save = on

shared_preload_libraries = 'pg_stat_statements'

# ---------------------------------------------------------------------------
# Locale and Encoding
# ---------------------------------------------------------------------------
timezone = 'UTC'

# ---------------------------------------------------------------------------
# Miscellaneous
# ---------------------------------------------------------------------------
# Idle-in-transaction timeout: kill sessions that hold locks but do nothing.
idle_in_transaction_session_timeout = 30000    # ms = 30 seconds

# Statement timeout: prevents runaway queries from blocking everything.
# 0 = no limit; set per-role if needed (e.g., SET statement_timeout = '30s').
statement_timeout = 0
