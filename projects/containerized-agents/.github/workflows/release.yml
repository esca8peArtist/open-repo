name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  UV_CACHE_DIR: ~/.cache/uv

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run pytest
        run: uv run pytest --tb=short -q
        env:
          POSTGRES_URL: postgresql+asyncpg://test:test@localhost/testdb
          REDIS_URL: redis://localhost:6379/0
          API_SECRET_KEY: test-secret-key-for-ci-pipeline-here

  publish:
    name: Publish Release
    runs-on: ubuntu-22.04
    needs: test
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          # Strip the leading 'v' from the tag name (e.g. v1.2.3 -> 1.2.3)
          BUNDLE_VERSION="${GITHUB_REF_NAME#v}"
          echo "BUNDLE_VERSION=${BUNDLE_VERSION}" >> "$GITHUB_ENV"
          echo "bundle_version=${BUNDLE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agentcore image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.agentcore
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/agentcore:${{ steps.version.outputs.bundle_version }}
            ghcr.io/${{ github.repository_owner }}/agentcore:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push wizard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.wizard
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wizard:${{ steps.version.outputs.bundle_version }}
            ghcr.io/${{ github.repository_owner }}/wizard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build compose bundle
        run: |
          chmod +x scripts/build_compose_bundle.sh
          bash scripts/build_compose_bundle.sh
        env:
          BUNDLE_VERSION: ${{ env.BUNDLE_VERSION }}
          SKIP_EXPORT: "1"
          PROFILE: base

      - name: Upload bundle to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/bundle/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
