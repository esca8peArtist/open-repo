name: Security Scan

on:
  push:
    branches:
      - main
      - master
  schedule:
    # Every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"

env:
  UV_CACHE_DIR: ~/.cache/uv

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies including pip-audit
        run: |
          uv sync --all-extras --dev
          uv pip install pip-audit

      - name: Run pip-audit
        id: audit
        run: |
          uv run pip-audit --format json --output pip-audit-results.json || true

      - name: Check for high/critical CVEs
        run: |
          python3 - <<'EOF'
          import json, sys

          with open("pip-audit-results.json") as f:
              results = json.load(f)

          severities_found = []
          for dep in results.get("dependencies", []):
              for vuln in dep.get("vulns", []):
                  severity = vuln.get("fix_versions", [])
                  aliases = vuln.get("aliases", [])
                  # pip-audit doesn't embed CVSS severity directly; flag any unfixed vuln
                  # and treat all open vulnerabilities as requiring attention
                  severities_found.append({
                      "package": dep.get("name"),
                      "version": dep.get("version"),
                      "id": vuln.get("id"),
                      "aliases": aliases,
                      "fix_versions": vuln.get("fix_versions", []),
                  })

          if severities_found:
              print(f"Found {len(severities_found)} vulnerabilit(ies):")
              for v in severities_found:
                  fix = ", ".join(v["fix_versions"]) if v["fix_versions"] else "no fix available"
                  print(f"  {v['package']}=={v['version']} — {v['id']} (fix: {fix})")
              print()
              print("Review vulnerabilities above. Failing build due to open CVEs.")
              sys.exit(1)
          else:
              print("No vulnerabilities found.")
          EOF

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          retention-days: 30

  container-scan:
    name: Container Scan
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agentcore image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.agentcore
          platforms: linux/amd64
          push: false
          load: true
          tags: agentcore:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: agentcore:scan
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container-scan
