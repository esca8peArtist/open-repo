[pytest]
# ---------------------------------------------------------------------------
# asyncio
# ---------------------------------------------------------------------------
asyncio_mode = auto

# ---------------------------------------------------------------------------
# Test discovery
# ---------------------------------------------------------------------------
testpaths =
    tests
    security/hardware_binding/tests

# ---------------------------------------------------------------------------
# Custom markers
# ---------------------------------------------------------------------------
markers =
    unit: Pure unit tests — no external services required
    integration: Live-service integration tests — require Docker (run with: pytest -m integration)
    offline: Tests that verify offline-only behaviour (no internet required)
    online: Tests that verify behaviour when internet is available (mocked)
    hardware: Tests related to hardware binding / TPM / fingerprinting
    license: Tests for the license generation / validation system
    crypto: Tests for cryptographic primitives
    rag: Tests for RAG / ChromaDB pipeline
    voice: Tests for STT / TTS voice pipeline
    channels: Tests for Telegram / Twilio channels
    api: Tests for the AgentCore REST API
    profiles: Tests for agent profile configurations
    pipeline: Tests for the PipelineEngine
    slow: Tests that take more than 1 second to run

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
log_cli = true
log_cli_level = WARNING

# ---------------------------------------------------------------------------
# Default run options
# Integration tests are skipped by default.
# Run them explicitly with:  pytest -m integration
# ---------------------------------------------------------------------------
addopts = -v --tb=short -m "not integration"
