name: rideshare_rider
description: Open-source rideshare rider app
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.1.0
  flutter_secure_storage: ^9.0.0
  geolocator: ^11.0.0
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  intl: ^0.19.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  riverpod_generator: ^2.3.9
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
