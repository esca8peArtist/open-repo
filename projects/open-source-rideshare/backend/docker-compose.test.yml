services:
  test-db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: openride_test
      POSTGRES_PASSWORD: openride_test
      POSTGRES_DB: openride_test
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openride_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  test-redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
