services:
  test-db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: openride_test
      POSTGRES_PASSWORD: openride_test
      POSTGRES_DB: openride_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openride_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  test-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
